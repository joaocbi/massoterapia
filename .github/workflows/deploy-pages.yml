name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p dist/img
          cp index.html dist/
          cp styles.css dist/
          cp script.js dist/
          cp site-config.js dist/
          cp img/logo-flow.png dist/img/
          cp img/flowclass.png dist/img/
          mkdir -p dist/fisiosaude/img
          cp fisiosaude/index.html dist/fisiosaude/
          cp fisiosaude/brand.css dist/fisiosaude/
          cp fisiosaude/site-config.js dist/fisiosaude/
          cp fisiosaude/img/logo-fisiosaude.png dist/fisiosaude/img/
          cp fisiosaude/img/fisio-panel-hero.png dist/fisiosaude/img/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
